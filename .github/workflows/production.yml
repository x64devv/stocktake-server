name: Deploy to Production

on:
  push:
    branches:
      - main          # triggers on every push to main
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: testing

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Set up SSH ─────────────────────────────────────────────────────────
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ vars.SSH_PORT }} -H ${{ vars.SSH_HOST }} >> ~/.ssh/known_hosts

      # ── 3. Write .env on the server ───────────────────────────────────────────
      # Writes the env file first so docker compose build can use it
      - name: Write .env to server
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ vars.SSH_PORT }} \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} \
              "mkdir -p ${{ vars.DEPLOY_PATH }}"

          ssh -i ~/.ssh/deploy_key \
              -p ${{ vars.SSH_PORT }} \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} \
              "cat > ${{ vars.DEPLOY_PATH }}/.env" << 'ENVEOF'
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          OTP_SECRET=${{ secrets.OTP_SECRET }}
          SMS_API_KEY=${{ secrets.SMS_API_KEY }}
          SMS_BASE_URL=https://sms.localhost.co.zw/api
          LS_BASE_URL=${{ vars.LS_BASE_URL }}
          LS_USERNAME=${{ vars.LS_USERNAME }}
          LS_PASSWORD=${{ vars.LS_PASSWORD }}
          LS_COMPANY_ID=${{ vars.LS_COMPANY_ID }}
          PUBLIC_WS_URL=${{ vars.PUBLIC_WS_URL }}
          OTP_EXPIRY_MINUTES=10
          OTP_MAX_REQUESTS=3
          COUNTER_TOKEN_HOURS=12
          ADMIN_TOKEN_HOURS=8
          VARIANCE_TOLERANCE_PCT=2.0
          ENVEOF

      # ── 4. Sync code to server ────────────────────────────────────────────────
      - name: Sync code via rsync
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.env' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ vars.SSH_PORT }}" \
            ./ ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }}:${{ vars.DEPLOY_PATH }}/

      # ── 5. Build and restart containers ──────────────────────────────────────
      - name: Deploy containers
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ vars.SSH_PORT }} \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} << 'SSHEOF'
            set -e
            cd ${{ vars.DEPLOY_PATH }}

            echo "→ Pulling latest images..."
            docker compose pull --ignore-pull-failures

            echo "→ Building and starting services..."
            docker compose up --build -d --remove-orphans

            echo "→ Waiting for API health check..."
            timeout 90 bash -c \
              'until docker inspect --format="{{.State.Health.Status}}" stocktake-api | grep -q "healthy"; do sleep 3; done'

            echo "→ Cleaning up old images..."
            docker image prune -f

            echo "✓ Deployment complete"
          SSHEOF

      # ── 6. Verify deployment ──────────────────────────────────────────────────
      - name: Verify API is responding
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ vars.SSH_PORT }} \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} \
              "curl -sf http://localhost:8000/api/v1/health || (echo 'Health check failed' && exit 1)"

      # ── 7. Notify on failure ──────────────────────────────────────────────────
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment failed. Check the logs above."
          # Optional: add a curl call to a Slack webhook or email here