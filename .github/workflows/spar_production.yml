name: Deploy to Spar Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Windows 11 Server
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: testing

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── OpenVPN ───────────────────────────────────────────────────────────────
      - name: Install OpenVPN
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn openvpn-systemd-resolved

      - name: Install OpenVPN
        run: sudo apt-get install -y openvpn openvpn-systemd-resolved

      - name: Connect to VPN
        run: |
          echo "${{ secrets.OVPN_CONFIG }}" > vpn.ovpn
          # Fix verify-x509-name format for OpenVPN 2.6+
          sed -i 's/verify-x509-name ".*"/verify-x509-name "Appliance_Certificate_tc3iamIOcmlsWqQ" name/' vpn.ovpn
          # Remove unsupported inline options
          sed -i '/^;/d' vpn.ovpn
          printf '%s\n%s\n' \
            "${{ secrets.VPN_USERNAME }}" \
            "${{ secrets.VPN_PASSWORD }}" > vpn-auth.txt
          chmod 600 vpn.ovpn vpn-auth.txt
          sudo openvpn \
            --config vpn.ovpn \
            --auth-user-pass vpn-auth.txt \
            --daemon \
            --log /tmp/ovpn.log
          echo "Waiting for tunnel..."
          for i in $(seq 1 12); do
            sleep 5
            if ping -c 1 -W 2 ${{ vars.SSH_HOST }} > /dev/null 2>&1; then
              echo "VPN connected — server reachable"
              exit 0
            fi
            echo "Attempt $i/12..."
          done
          echo "=== VPN LOG ==="
          cat /tmp/ovpn.log
          exit 1

      # ── SSH ───────────────────────────────────────────────────────────────────
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ vars.SSH_PORT }} -H ${{ vars.SSH_HOST }} >> ~/.ssh/known_hosts

      # ── Write .env ────────────────────────────────────────────────────────────
      - name: Write .env to server
        run: |
          printf '%s\n' \
            "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" \
            "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}" \
            "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
            "OTP_SECRET=${{ secrets.OTP_SECRET }}" \
            "SMS_API_KEY=${{ secrets.SMS_API_KEY }}" \
            "SMS_BASE_URL=https://sms.localhost.co.zw/api" \
            "LS_BASE_URL=${{ vars.LS_BASE_URL }}" \
            "LS_USERNAME=${{ vars.LS_USERNAME }}" \
            "LS_PASSWORD=${{ secrets.LS_PASSWORD }}" \
            "LS_COMPANY_ID=${{ vars.LS_COMPANY_ID }}" \
            "PUBLIC_WS_URL=${{ vars.PUBLIC_WS_URL }}" \
            "OTP_EXPIRY_MINUTES=10" \
            "OTP_MAX_REQUESTS=3" \
            "COUNTER_TOKEN_HOURS=12" \
            "ADMIN_TOKEN_HOURS=8" \
            "VARIANCE_TOLERANCE_PCT=2.0" \
          | ssh -i ~/.ssh/deploy_key -p ${{ vars.SSH_PORT }} \
                ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} \
                "cat > ${{ vars.DEPLOY_PATH }}/.env"

      # ── Sync code ─────────────────────────────────────────────────────────────
      - name: Sync code
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.env' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ vars.SSH_PORT }}" \
            ./ ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }}:${{ vars.DEPLOY_PATH }}/

      # ── Deploy ────────────────────────────────────────────────────────────────
      - name: Deploy containers
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ vars.SSH_PORT }} \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} \
              "cd /d ${{ vars.DEPLOY_PATH }} && docker compose up --build -d --remove-orphans && docker image prune -f"

      # ── Health check ──────────────────────────────────────────────────────────
      - name: Health check
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ vars.SSH_PORT }} \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} \
              "curl -sf http://localhost:8080/health || exit 1"

      # ── Disconnect VPN ────────────────────────────────────────────────────────
      - name: Disconnect VPN
        if: always()
        run: sudo killall openvpn || true

      - name: Notify on failure
        if: failure()
        run: echo "::error::Deployment failed — check logs above"