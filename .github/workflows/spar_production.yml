name: Deploy to Spar Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: SSH Deploy (WSL2)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: testing

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Set up SSH ─────────────────────────────────────────────────────────
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ vars.SSH_PORT }} -H ${{ vars.SSH_HOST }} >> ~/.ssh/known_hosts

      # ── 3. Create deploy dir inside WSL ────────────────────────────────────────
      - name: Ensure WSL deploy directory
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ vars.SSH_PORT }} \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} \
              "wsl -d Ubuntu -- bash -c 'mkdir -p /home/stocktake/app'"

      # ── 4. Write .env inside WSL ──────────────────────────────────────────────
      - name: Write .env to WSL
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ vars.SSH_PORT }} \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} \
              "wsl -d Ubuntu -- bash -c 'cat > /home/stocktake/app/.env'" << 'ENVEOF'
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          OTP_SECRET=${{ secrets.OTP_SECRET }}
          SMS_API_KEY=${{ secrets.SMS_API_KEY }}
          SMS_BASE_URL=https://sms.localhost.co.zw/api
          LS_BASE_URL=${{ vars.LS_BASE_URL }}
          LS_USERNAME=${{ vars.LS_USERNAME }}
          LS_PASSWORD=${{ vars.LS_PASSWORD }}
          LS_COMPANY_ID=${{ vars.LS_COMPANY_ID }}
          PUBLIC_WS_URL=${{ vars.PUBLIC_WS_URL }}
          OTP_EXPIRY_MINUTES=10
          OTP_MAX_REQUESTS=3
          COUNTER_TOKEN_HOURS=12
          ADMIN_TOKEN_HOURS=8
          VARIANCE_TOLERANCE_PCT=2.0
          ENVEOF

      # ── 5. Sync code to WSL filesystem ────────────────────────────────────────
      # rsync into a Windows temp dir, then wsl cp into the Linux filesystem
      # (rsync can't target WSL paths directly via SSH)
      - name: Sync code to server
        run: |
          # rsync to a Windows staging dir
          ssh -i ~/.ssh/deploy_key \
              -p ${{ vars.SSH_PORT }} \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} \
              "if not exist C:\\stocktake-staging mkdir C:\\stocktake-staging"

          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='.next' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ vars.SSH_PORT }}" \
            ./ ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }}:C:/stocktake-staging/

          # Move from Windows mount into WSL native filesystem
          ssh -i ~/.ssh/deploy_key \
              -p ${{ vars.SSH_PORT }} \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} \
              "wsl -d Ubuntu -- bash -c '
                rsync -a --delete \
                  --exclude=.env \
                  /mnt/c/stocktake-staging/ /home/stocktake/app/
              '"

      # ── 6. Build and restart containers inside WSL ────────────────────────────
      - name: Deploy containers
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ vars.SSH_PORT }} \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} \
              "wsl -d Ubuntu -- bash -c '
                set -e
                cd /home/stocktake/app

                echo \"→ Pulling latest images...\"
                docker compose pull --ignore-pull-failures

                echo \"→ Building and starting services...\"
                docker compose up --build -d --remove-orphans

                echo \"→ Waiting for API health check...\"
                timeout 90 bash -c \
                  \"until docker inspect --format={{.State.Health.Status}} stocktake-api 2>/dev/null | grep -q healthy; do sleep 3; done\"

                echo \"→ Cleaning up old images...\"
                docker image prune -f

                echo \"✓ Deployment complete\"
              '"

      # ── 7. Verify deployment ──────────────────────────────────────────────────
      - name: Verify API is responding
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ vars.SSH_PORT }} \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} \
              "wsl -d Ubuntu -- bash -c 'curl -sf http://localhost:8080/health || (echo Health check failed && exit 1)'"

      # ── 8. Notify on failure ──────────────────────────────────────────────────
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment failed. Check the logs above."