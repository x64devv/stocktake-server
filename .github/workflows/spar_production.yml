name: Deploy to Spar Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: SSH Deploy (WSL2)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: testing

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Configure SSH ──────────────────────────────────────────────────────
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ vars.SSH_PORT }} -H ${{ vars.SSH_HOST }} >> ~/.ssh/known_hosts

      # ── 3. Write .env — write locally, scp to Windows, cp into WSL ───────────
      - name: Write .env to WSL
        run: |
          # Build the .env file on the runner first
          cat > deployment.env << 'EOF'
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          OTP_SECRET=${{ secrets.OTP_SECRET }}
          SMS_API_KEY=${{ secrets.SMS_API_KEY }}
          SMS_BASE_URL=https://sms.localhost.co.zw/api
          LS_BASE_URL=${{ vars.LS_BASE_URL }}
          LS_USERNAME=${{ vars.LS_USERNAME }}
          LS_PASSWORD=${{ secrets.LS_PASSWORD }}
          LS_COMPANY_ID=${{ vars.LS_COMPANY_ID }}
          PUBLIC_WS_URL=${{ vars.PUBLIC_WS_URL }}
          OTP_EXPIRY_MINUTES=10
          OTP_MAX_REQUESTS=3
          COUNTER_TOKEN_HOURS=12
          ADMIN_TOKEN_HOURS=8
          VARIANCE_TOLERANCE_PCT=2.0
          EOF

          # Ensure Windows staging dir exists (PowerShell syntax)
          ssh -i ~/.ssh/deploy_key -p ${{ vars.SSH_PORT }} \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} \
              "powershell -Command \"New-Item -ItemType Directory -Path 'C:\\stocktake-staging' -Force | Out-Null\""

          # scp .env to Windows staging dir
          scp -i ~/.ssh/deploy_key -P ${{ vars.SSH_PORT }} \
              deployment.env \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }}:"C:/stocktake-staging/.env"

          # Copy from Windows mount into WSL native filesystem
          ssh -i ~/.ssh/deploy_key -p ${{ vars.SSH_PORT }} \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} \
              "wsl -d Ubuntu -- bash -c 'mkdir -p /home/stocktake/app && cp /mnt/c/stocktake-staging/.env /home/stocktake/app/.env'"

      # ── 4. Sync code — rsync to Windows staging, then rsync into WSL ─────────
      - name: Sync code to server
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='.next' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ vars.SSH_PORT }}" \
            ./ ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }}:C:/stocktake-staging/

          ssh -i ~/.ssh/deploy_key -p ${{ vars.SSH_PORT }} \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} \
              "wsl -d Ubuntu -- bash -c 'rsync -a --delete --exclude=.env /mnt/c/stocktake-staging/ /home/stocktake/app/'"

      # ── 5. Build and restart containers inside WSL ────────────────────────────
      - name: Deploy containers
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ vars.SSH_PORT }} \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} \
              "wsl -d Ubuntu -- bash -c 'set -e && cd /home/stocktake/app && docker compose pull --ignore-pull-failures && docker compose up --build -d --remove-orphans && docker image prune -f && echo done'"

      # ── 6. Wait for API healthy ───────────────────────────────────────────────
      - name: Wait for API health
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ vars.SSH_PORT }} \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} \
              "wsl -d Ubuntu -- bash -c 'for i in \$(seq 1 30); do sleep 3; STATUS=\$(docker inspect --format=\"{{.State.Health.Status}}\" stocktake-api 2>/dev/null || echo unknown); echo \"Attempt \$i: \$STATUS\"; if [ \"\$STATUS\" = \"healthy\" ]; then echo API is healthy; exit 0; fi; done; echo Timed out waiting for health; exit 1'"

      # ── 7. Verify API responding ──────────────────────────────────────────────
      - name: Verify API is responding
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ vars.SSH_PORT }} \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} \
              "wsl -d Ubuntu -- bash -c 'curl -sf http://localhost:8080/health && echo OK'"

      # ── 8. Cleanup ────────────────────────────────────────────────────────────
      - name: Cleanup
        if: always()
        run: rm -f deployment.env

      # ── 9. Notify on failure ──────────────────────────────────────────────────
      - name: Notify on failure
        if: failure()
        run: echo "::error::Deployment failed — check logs above"