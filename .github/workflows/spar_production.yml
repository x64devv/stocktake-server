name: Deploy to Spar Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: SSH Deploy (WSL2)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: testing

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Install OpenVPN ───────────────────────────────────────────────────
      - name: Install OpenVPN
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y openvpn

      # ── 3. Connect VPN ───────────────────────────────────────────────────────
      - name: Connect OpenVPN
        timeout-minutes: 2
        run: |
          mkdir -p .github/vpn

          # Write raw config from secret (no base64)
          cat > .github/vpn/spar.ovpn << 'OVPNEOF'
          ${{ secrets.OVPN_CONFIG }}
          OVPNEOF

          # Strip leading whitespace introduced by heredoc indentation
          sed -i 's/^          //' .github/vpn/spar.ovpn

          # Remove options that break OpenVPN 2.6 on the runner
          sed -i '/^verify-x509-name/d' .github/vpn/spar.ovpn

          # Remove commented lines
          sed -i '/^;/d' .github/vpn/spar.ovpn

          # Remove bare 'auth-user-pass' — passing creds inline below
          sed -i '/^auth-user-pass/d' .github/vpn/spar.ovpn

          echo "=== Config that will be used ==="
          cat .github/vpn/spar.ovpn
          echo "================================="

          # Run in foreground, all logs to stdout, verb 4 for full detail
          printf '%s\n%s\n' '${{ secrets.VPN_USERNAME }}' '${{ secrets.VPN_PASSWORD }}' | \
            sudo openvpn \
              --config .github/vpn/spar.ovpn \
              --auth-user-pass /dev/stdin \
              --verb 4