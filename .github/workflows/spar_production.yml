name: Deploy to Spar Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Spar Server
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: testing

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── OpenVPN ───────────────────────────────────────────────────────────────
      - name: Install OpenVPN
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn openvpn-systemd-resolved

      - name: Install OpenVPN
        run: sudo apt-get install -y openvpn openvpn-systemd-resolved

      - name: Connect to VPN
        run: |
          echo "${{ secrets.OVPN_CONFIG }}" > vpn.ovpn
          sed -i '/^verify-x509-name/d' vpn.ovpn
          sed -i '/^;/d' vpn.ovpn
          printf '%s\n%s\n' \
            "${{ secrets.VPN_USERNAME }}" \
            "${{ secrets.VPN_PASSWORD }}" > vpn-auth.txt
          chmod 600 vpn.ovpn vpn-auth.txt
          sudo openvpn \
            --config vpn.ovpn \
            --auth-user-pass vpn-auth.txt \
            --log /tmp/ovpn.log \
            --daemon
          echo "Waiting for tunnel..."
          for i in $(seq 1 12); do
            sleep 5
            if sudo grep -q "Initialization Sequence Completed" /tmp/ovpn.log 2>/dev/null; then
              echo "VPN tunnel established"
              break
            fi
            echo "Attempt $i/12..."
          done
          # Verify tunnel is up
          sudo grep -q "Initialization Sequence Completed" /tmp/ovpn.log \
            || (sudo cat /tmp/ovpn.log && exit 1)
          echo "Assigned VPN IP:"
          sudo cat /tmp/ovpn.log | grep "net_addr_v4_add"
          echo "Testing server reachability..."
          ping -c 3 -W 2 ${{ vars.SSH_HOST }} \
            && echo "Server reachable" \
            || echo "WARNING: ping failed — SSH will determine if server is reachable"

      # ── SSH ───────────────────────────────────────────────────────────────────
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ vars.SSH_PORT }} -H ${{ vars.SSH_HOST }} >> ~/.ssh/known_hosts

      # ── Write .env ────────────────────────────────────────────────────────────
      - name: Write .env to server
        run: |
          # Create .env locally on runner first
          cat > deployment.env << 'EOF'
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          OTP_SECRET=${{ secrets.OTP_SECRET }}
          SMS_API_KEY=${{ secrets.SMS_API_KEY }}
          SMS_BASE_URL=https://sms.localhost.co.zw/api
          LS_BASE_URL=${{ vars.LS_BASE_URL }}
          LS_USERNAME=${{ vars.LS_USERNAME }}
          LS_PASSWORD=${{ secrets.LS_PASSWORD }}
          LS_COMPANY_ID=${{ vars.LS_COMPANY_ID }}
          PUBLIC_WS_URL=${{ vars.PUBLIC_WS_URL }}
          OTP_EXPIRY_MINUTES=10
          OTP_MAX_REQUESTS=3
          COUNTER_TOKEN_HOURS=12
          ADMIN_TOKEN_HOURS=8
          VARIANCE_TOLERANCE_PCT=2.0
          EOF

          # Ensure deploy directory exists
          ssh -i ~/.ssh/deploy_key -p ${{ vars.SSH_PORT }} \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} \
              "powershell -Command \"New-Item -ItemType Directory -Path 'C:\\stocktake' -Force | Out-Null\""

          # Copy file directly via scp
          scp -i ~/.ssh/deploy_key -P ${{ vars.SSH_PORT }} \
              deployment.env \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }}:"C:/stocktake/.env"

      - name: Sync code
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.env' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ vars.SSH_PORT }}" \
            ./ ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }}:"/c/stocktake/"

      - name: Deploy containers
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ vars.SSH_PORT }} \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} \
              "powershell -Command \"Set-Location 'C:\\stocktake'; docker compose up --build -d --remove-orphans; docker image prune -f\""

      - name: Health check
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ vars.SSH_PORT }} \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} \
              "powershell -Command \"(Invoke-WebRequest -Uri 'http://localhost:8080/health' -UseBasicParsing).StatusCode\""

      # ── Sync code ─────────────────────────────────────────────────────────────
      - name: Sync code
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.env' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ vars.SSH_PORT }}" \
            ./ ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }}:${{ vars.DEPLOY_PATH }}/

      # ── Deploy ────────────────────────────────────────────────────────────────
      - name: Deploy containers
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ vars.SSH_PORT }} \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} \
              "cd /d ${{ vars.DEPLOY_PATH }} && docker compose up --build -d --remove-orphans && docker image prune -f"

      # ── Health check ──────────────────────────────────────────────────────────
      - name: Health check
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ vars.SSH_PORT }} \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} \
              "curl -sf http://localhost:8080/health || exit 1"

      # ── Disconnect VPN ────────────────────────────────────────────────────────
      - name: Disconnect VPN
        if: always()
        run: sudo killall openvpn || true

      - name: Notify on failure
        if: failure()
        run: echo "::error::Deployment failed — check logs above"