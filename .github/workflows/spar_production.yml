name: Deploy to Spar Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: SSH Deploy (WSL2)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: testing

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Install OpenVPN ───────────────────────────────────────────────────
      - name: Install OpenVPN
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y openvpn openvpn-systemd-resolved

      # ── 3. Connect VPN ───────────────────────────────────────────────────────
      - name: Connect OpenVPN
        run: |
          mkdir -p .github/vpn

          # Write raw config directly — no base64 encoding
          echo "${{ secrets.OVPN_CONFIG }}" > .github/vpn/spar.ovpn

          # Strip options that OpenVPN 2.6+ doesn't accept
          sed -i '/^verify-x509-name/d' .github/vpn/spar.ovpn
          sed -i '/^;/d' .github/vpn/spar.ovpn

          # Write credentials (config has 'auth-user-pass' with no file — add the file)
          echo "${{ secrets.VPN_USERNAME }}" > .github/vpn/creds.txt
          echo "${{ secrets.VPN_PASSWORD }}" >> .github/vpn/creds.txt
          chmod 600 .github/vpn/creds.txt

          # Point auth-user-pass at the creds file
          sed -i 's|^auth-user-pass$|auth-user-pass .github/vpn/creds.txt|' .github/vpn/spar.ovpn

          sudo openvpn \
            --config .github/vpn/spar.ovpn \
            --daemon \
            --log vpn.log \
            --writepid vpn.pid

          echo "Waiting for VPN..."
          for i in $(seq 1 30); do
            if ping -c 1 -W 2 ${{ vars.SSH_HOST }} > /dev/null 2>&1; then
              echo "VPN connected — host reachable (attempt $i)"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "VPN failed to connect"
              cat vpn.log
              exit 1
            fi
            sleep 2
          done

      # ── 4. Configure SSH ─────────────────────────────────────────────────────
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ vars.SSH_PORT }} -H ${{ vars.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      # ── 5. Write .env into WSL ───────────────────────────────────────────────
      - name: Write .env to WSL
        run: |
          cat > deployment.env << 'ENVEOF'
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          OTP_SECRET=${{ secrets.OTP_SECRET }}
          SMS_API_KEY=${{ secrets.SMS_API_KEY }}
          SMS_BASE_URL=https://sms.localhost.co.zw/api
          LS_BASE_URL=${{ vars.LS_BASE_URL }}
          LS_USERNAME=${{ vars.LS_USERNAME }}
          LS_PASSWORD=${{ vars.LS_PASSWORD }}
          LS_COMPANY_ID=${{ vars.LS_COMPANY_ID }}
          PUBLIC_WS_URL=${{ vars.PUBLIC_WS_URL }}
          OTP_EXPIRY_MINUTES=10
          OTP_MAX_REQUESTS=3
          COUNTER_TOKEN_HOURS=12
          ADMIN_TOKEN_HOURS=8
          VARIANCE_TOLERANCE_PCT=2.0
          ENVEOF

          # Strip leading whitespace from heredoc
          sed -i 's/^          //' deployment.env

          # Ensure deploy dir exists in WSL
          ssh -i ~/.ssh/deploy_key -p ${{ vars.SSH_PORT }} \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} \
              "wsl -d Ubuntu -- bash -c 'mkdir -p /home/stocktake/app'"

          # Copy .env to Windows, then move into WSL
          scp -i ~/.ssh/deploy_key -P ${{ vars.SSH_PORT }} \
              deployment.env ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }}:C:/stocktake-staging-env

          ssh -i ~/.ssh/deploy_key -p ${{ vars.SSH_PORT }} \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} \
              "wsl -d Ubuntu -- bash -c 'cp /mnt/c/stocktake-staging-env /home/stocktake/app/.env'"

      # ── 6. Sync code ─────────────────────────────────────────────────────────
      - name: Sync code to server
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='.next' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ vars.SSH_PORT }}" \
            ./ ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }}:C:/stocktake-staging/

          ssh -i ~/.ssh/deploy_key -p ${{ vars.SSH_PORT }} \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} \
              "wsl -d Ubuntu -- bash -c 'rsync -a --delete --exclude=.env /mnt/c/stocktake-staging/ /home/stocktake/app/'"

      # ── 7. Build and restart containers ──────────────────────────────────────
      - name: Deploy containers
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ vars.SSH_PORT }} \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} \
              "wsl -d Ubuntu -- bash -c 'set -e && cd /home/stocktake/app && docker compose pull --ignore-pull-failures && docker compose up --build -d --remove-orphans && docker image prune -f && echo done'"

      # ── 8. Wait for API healthy ──────────────────────────────────────────────
      - name: Wait for API health
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ vars.SSH_PORT }} \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} \
              "wsl -d Ubuntu -- bash -c 'for i in \$(seq 1 30); do sleep 3; STATUS=\$(docker inspect --format=\"{{.State.Health.Status}}\" stocktake-api 2>/dev/null || echo unknown); echo \"Attempt \$i: \$STATUS\"; if [ \"\$STATUS\" = \"healthy\" ]; then echo API is healthy; exit 0; fi; done; echo Timed out; exit 1'"

      # ── 9. Verify API responding ─────────────────────────────────────────────
      - name: Verify API is responding
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ vars.SSH_PORT }} \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} \
              "wsl -d Ubuntu -- bash -c 'curl -sf http://localhost:8080/health && echo OK'"

      # ── 10. Kill VPN ─────────────────────────────────────────────────────────
      - name: Kill VPN connection
        if: always()
        run: |
          sudo chmod 777 vpn.log || true
          sudo killall openvpn || true

      # ── 11. Upload VPN logs ──────────────────────────────────────────────────
      - name: Upload VPN logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vpn-logs
          path: vpn.log

      # ── 12. Cleanup ──────────────────────────────────────────────────────────
      - name: Cleanup
        if: always()
        run: rm -f deployment.env .github/vpn/creds.txt

      # ── 13. Notify on failure ────────────────────────────────────────────────
      - name: Notify on failure
        if: failure()
        run: echo "::error::Deployment failed — check logs above"