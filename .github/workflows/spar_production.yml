name: Deploy to Spar Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: SSH Deploy (WSL2)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: testing

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Install OpenVPN ───────────────────────────────────────────────────
      - name: Install OpenVPN
        run: |
          sudo apt-get update
          sudo apt-get --assume-yes --no-install-recommends install openvpn

      # ── 3. Setup VPN config ──────────────────────────────────────────────────
      - name: Setup VPN config
        run: |
          mkdir -p .github/vpn
          echo "${{ secrets.OVPN_CONFIG }}" > .github/vpn/config.ovpn
          echo "${{ secrets.VPN_USERNAME }}" > .github/vpn/creds.txt
          echo "${{ secrets.VPN_PASSWORD }}" >> .github/vpn/creds.txt
          chmod 600 .github/vpn/config.ovpn .github/vpn/creds.txt
          grep -q "auth-user-pass" .github/vpn/config.ovpn || \
            echo "auth-user-pass .github/vpn/creds.txt" >> .github/vpn/config.ovpn
          sed -i '/^verify-x509-name/d' .github/vpn/config.ovpn
          sed -i '/^ns-cert-type/d'     .github/vpn/config.ovpn
          sed -i '/^keysize/d'          .github/vpn/config.ovpn

      # ── 4. Connect VPN ───────────────────────────────────────────────────────
      - name: Connect VPN
        run: |
          sudo openvpn \
            --config .github/vpn/config.ovpn \
            --log vpn.log \
            --daemon

      # ── 5. Wait for VPN ──────────────────────────────────────────────────────
      - name: Wait for VPN connection
        timeout-minutes: 1
        run: until ping -c1 ${{ vars.SSH_HOST }}; do sleep 2; echo "Waiting..."; done

      # ── 6. Configure SSH ─────────────────────────────────────────────────────
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ vars.SSH_PORT }} -H ${{ vars.SSH_HOST }} >> ~/.ssh/known_hosts

      # ── 7. Write .env to WSL ─────────────────────────────────────────────────
      - name: Write .env to WSL
        run: |
          cat > deployment.env << 'ENVEOF'
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          OTP_SECRET=${{ secrets.OTP_SECRET }}
          SMS_API_KEY=${{ secrets.SMS_API_KEY }}
          SMS_BASE_URL=https://sms.localhost.co.zw/api
          LS_BASE_URL=${{ vars.LS_BASE_URL }}
          LS_USERNAME=${{ vars.LS_USERNAME }}
          LS_PASSWORD=${{ secrets.LS_PASSWORD }}
          LS_COMPANY_ID=${{ vars.LS_COMPANY_ID }}
          PUBLIC_WS_URL=${{ vars.PUBLIC_WS_URL }}
          OTP_EXPIRY_MINUTES=10
          OTP_MAX_REQUESTS=3
          COUNTER_TOKEN_HOURS=12
          ADMIN_TOKEN_HOURS=8
          VARIANCE_TOLERANCE_PCT=2.0
          ENVEOF

          ssh -i ~/.ssh/deploy_key -p ${{ vars.SSH_PORT }} \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} \
              "powershell -Command \"New-Item -ItemType Directory -Path 'C:\\stocktake-staging' -Force | Out-Null\""

          scp -i ~/.ssh/deploy_key -P ${{ vars.SSH_PORT }} \
              deployment.env \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }}:"C:/stocktake-staging/.env"

          ssh -i ~/.ssh/deploy_key -p ${{ vars.SSH_PORT }} \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} \
              "wsl -d Ubuntu -- bash -c 'mkdir -p /home/stocktake/app && cp /mnt/c/stocktake-staging/.env /home/stocktake/app/.env'"

      # ── 8. Sync code ─────────────────────────────────────────────────────────
      - name: Sync code to server
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='.next' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ vars.SSH_PORT }}" \
            ./ ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }}:C:/stocktake-staging/

          ssh -i ~/.ssh/deploy_key -p ${{ vars.SSH_PORT }} \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} \
              "wsl -d Ubuntu -- bash -c 'rsync -a --delete --exclude=.env /mnt/c/stocktake-staging/ /home/stocktake/app/'"

      # ── 9. Deploy containers ──────────────────────────────────────────────────
      - name: Deploy containers
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ vars.SSH_PORT }} \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} \
              "wsl -d Ubuntu -- bash -c 'set -e && cd /home/stocktake/app && docker compose pull --ignore-pull-failures && docker compose up --build -d --remove-orphans && docker image prune -f && echo done'"

      # ── 10. Wait for API healthy ──────────────────────────────────────────────
      - name: Wait for API health
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ vars.SSH_PORT }} \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} \
              "wsl -d Ubuntu -- bash -c 'for i in \$(seq 1 30); do sleep 3; STATUS=\$(docker inspect --format=\"{{.State.Health.Status}}\" stocktake-api 2>/dev/null || echo unknown); echo \"Attempt \$i: \$STATUS\"; if [ \"\$STATUS\" = \"healthy\" ]; then echo API is healthy; exit 0; fi; done; echo Timed out; exit 1'"

      # ── 11. Verify API responding ─────────────────────────────────────────────
      - name: Verify API is responding
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ vars.SSH_PORT }} \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} \
              "wsl -d Ubuntu -- bash -c 'curl -sf http://localhost:8080/health && echo OK'"

      # ── 12. Kill VPN ─────────────────────────────────────────────────────────
      - name: Kill VPN connection
        if: always()
        run: |
          sudo chmod 777 vpn.log || true
          sudo killall openvpn || true

      # ── 13. Upload VPN logs ───────────────────────────────────────────────────
      - name: Upload VPN logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vpn-logs
          path: vpn.log

      # ── 14. Cleanup ───────────────────────────────────────────────────────────
      - name: Cleanup
        if: always()
        run: rm -f deployment.env .github/vpn/creds.txt

      # ── 15. Notify on failure ─────────────────────────────────────────────────
      - name: Notify on failure
        if: failure()
        run: echo "::error::Deployment failed — check logs above"